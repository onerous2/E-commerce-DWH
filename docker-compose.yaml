version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Подключение к БД метаданных Airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Преднастроенный connection к нашему DWH для будущих дагов
    AIRFLOW_CONN_POSTGRES_DWH: postgresql://com_user:com_password@postgres_dwh:5432/com_db
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data/raw:/opt/airflow/data/raw # Наш Data Lake
  depends_on:
    - postgres_airflow

services:
  # 1. База данных для нужд самого Airflow
  postgres_airflow:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Уводим на порт 5433, чтобы не было конфликтов

  # 2. Наше целевое хранилище (Слои stg, dwh, analytics)
  postgres_dwh:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: com_user
      POSTGRES_PASSWORD: com_password
      POSTGRES_DB: com_db
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
    ports:
      - "5434:5432" # Стандартный порт для локального подключения (например, через DBeaver)

  # 3. Инициализация базы данных Airflow и создание админа
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  # 4. Веб-интерфейс Airflow
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # 5. Планировщик Airflow
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data:
  postgres_dwh_data: